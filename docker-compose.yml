services:
  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/prototypebd.db
      # All origins that may send requests to the API (localhost + public host)
      ALLOWED_ORIGINS: >-
        ["http://localhost:5555","http://localhost:8888","http://${SERVER_HOST}:5555","http://${SERVER_HOST}:8888"]
      API_PREFIX: /api/v1
    volumes:
      - backend_static:/app/static
      - sqlite_data:/app/data
    networks:
      - proxy
    ports:
      - "8888:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/categories')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle — must be the public address the browser will use
        NEXT_PUBLIC_API_URL: http://${SERVER_HOST}:8888/api/v1
        NEXT_PUBLIC_SITE_URL: http://${SERVER_HOST}:5555
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://${SERVER_HOST}:8888/api/v1
      NEXT_PUBLIC_SITE_URL: http://${SERVER_HOST}:5555
      # Server-side only — reaches backend via Docker internal DNS, not public IP
      INTERNAL_API_URL: http://backend:8000/api/v1
      BACKEND_URL: http://backend:8000
      PORT: 3000
    volumes:
      - backend_static:/app/static:ro
    networks:
      - proxy
    ports:
      - "5555:3000"

volumes:
  backend_static:
  sqlite_data:

networks:
  proxy:
