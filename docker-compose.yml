services:
  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/prototypebd.db
      ALLOWED_ORIGINS: '["https://prototypebd.com","http://localhost:5555","http://localhost:8888"]'
      API_PREFIX: /api/v1
    volumes:
      - backend_static:/app/static
      - sqlite_data:/app/data
    networks:
      - proxy
    ports:
      - "8888:8000"

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8888/api/v1}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:5555}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8888/api/v1}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:5555}
      PORT: 3000
    networks:
      - proxy
    ports:
      - "5555:3000"

volumes:
  backend_static:
  sqlite_data:

networks:
  proxy:      # nginx ↔ backend + frontend
