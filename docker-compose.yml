services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: prototypebd
      POSTGRES_USER: prototypebd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prototypebd -d prototypebd"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://prototypebd:${POSTGRES_PASSWORD}@db:5432/prototypebd
      ALLOWED_ORIGINS: '["https://prototypebd.com","http://localhost:3000"]'
      API_PREFIX: /api/v1
    volumes:
      - backend_static:/app/static
    networks:
      - internal
      - proxy
    expose:
      - "8000"

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://prototypebd.com/api/v1}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://prototypebd.com}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://prototypebd.com/api/v1}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://prototypebd.com}
      PORT: 3000
    networks:
      - proxy
    expose:
      - "3000"

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - backend_static:/srv/static:ro
    networks:
      - proxy

volumes:
  postgres_data:
  backend_static:

networks:
  internal:   # db ↔ backend only — never exposed to nginx
  proxy:      # nginx ↔ backend + frontend
